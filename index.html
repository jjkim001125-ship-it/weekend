<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Equipment Management System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .scheduler-grid { display: grid; grid-template-columns: 70px repeat(4, 1fr); }
        .sticky-left { position: sticky; left: 0; background: white; z-index: 10; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .slot-btn.selected { background-color: #4f46e5; color: white; border-color: #4f46e5; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .slot-btn.disabled { background-color: #f1f5f9; color: #cbd5e1; cursor: not-allowed; border-color: transparent; font-style: italic; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-20">

    <!-- Navbar -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="router.go('user')">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-100">
                    <i data-lucide="flask-conical" class="w-5 h-5"></i>
                </div>
                <h1 class="font-black text-xl tracking-tighter">LAB MANAGER</h1>
            </div>

            <nav class="flex bg-slate-100 p-1 rounded-2xl gap-1">
                <button onclick="router.go('user')" id="nav-user" class="nav-btn flex items-center gap-2 px-5 py-2 rounded-xl text-sm font-black transition-all bg-white shadow-sm text-indigo-600">
                    <i data-lucide="calendar" class="w-4 h-4"></i> 신청 페이지
                </button>
                <button onclick="router.go('admin')" id="nav-admin" class="nav-btn flex items-center gap-2 px-5 py-2 rounded-xl text-sm font-black transition-all text-slate-500 hover:text-slate-800">
                    <i data-lucide="settings" class="w-4 h-4"></i> 관리 모드
                </button>
            </nav>
        </div>
    </header>

    <!-- Global Feedback Message -->
    <div id="feedback-toast" class="fixed top-20 left-1/2 -translate-x-1/2 z-[100] hidden animate-in fade-in slide-in-from-top-4">
        <div class="px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 border bg-white" id="toast-container">
            <span id="toast-icon"></span>
            <span id="toast-text" class="font-bold text-sm"></span>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 pt-8">
        
        <!-- --- SECTION 1: USER RESERVATION --- -->
        <section id="view-user" class="view-section active space-y-8">
            <div class="max-w-4xl mx-auto space-y-8">
                <!-- Banner -->
                <div class="bg-indigo-900 rounded-3xl p-8 text-white shadow-xl relative overflow-hidden">
                    <div class="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                        <div class="flex-1 space-y-3">
                            <div class="flex items-center gap-2">
                                <i data-lucide="info" class="w-6 h-6 text-amber-400"></i>
                                <h2 class="font-black text-2xl">장비 사용 신청 안내</h2>
                            </div>
                            <p id="user-notice-text" class="text-indigo-100 font-medium text-lg opacity-95 leading-relaxed">공지사항을 불러오는 중...</p>
                        </div>
                        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-5 border border-white/20 min-w-[240px]">
                            <div class="flex items-center gap-2 mb-3 text-xs font-black text-indigo-200 uppercase tracking-widest">
                                <i data-lucide="zap" class="w-3 h-3 text-amber-300"></i> 이번 주 교체 타겟
                            </div>
                            <div id="user-targets-container" class="flex flex-wrap gap-2">
                                <!-- Targets will be injected here -->
                            </div>
                        </div>
                    </div>
                    <div class="absolute top-0 right-0 w-80 h-80 bg-white/5 rounded-full blur-3xl -mr-32 -mt-32"></div>
                </div>

                <!-- Form -->
                <div class="bg-white rounded-[40px] border border-slate-200 shadow-2xl p-10">
                    <form id="reservation-form" class="space-y-12">
                        <div class="space-y-6">
                            <div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-black">1</div><h3 class="font-black text-2xl text-slate-800 tracking-tight">신청자 성함</h3></div>
                            <div class="relative">
                                <i data-lucide="user" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                                <input type="text" id="input-name" required placeholder="성함을 입력하세요" class="w-full pl-14 pr-6 py-5 rounded-3xl border-2 border-slate-100 bg-slate-50 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all font-bold text-lg text-slate-700">
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-black">2</div><h3 class="font-black text-2xl text-slate-800 tracking-tight">장비 및 상세 계획</h3></div>
                            <div class="grid md:grid-cols-2 gap-6">
                                <div class="flex gap-3">
                                    <button type="button" data-eq="sputter" class="eq-btn flex-1 py-6 rounded-3xl border-2 font-black text-base transition-all flex flex-col items-center gap-2 bg-white border-slate-100 text-slate-400 hover:border-slate-300">
                                        <i data-lucide="zap" class="w-6 h-6"></i> 스퍼터
                                    </button>
                                    <button type="button" data-eq="ald" class="eq-btn flex-1 py-6 rounded-3xl border-2 font-black text-base transition-all flex flex-col items-center gap-2 bg-white border-slate-100 text-slate-400 hover:border-slate-300">
                                        <i data-lucide="zap" class="w-6 h-6"></i> ALD
                                    </button>
                                </div>
                                <div class="relative">
                                    <i data-lucide="list-checks" class="absolute left-5 top-6 text-slate-400 w-5 h-5"></i>
                                    <textarea id="input-plan" required placeholder="공정 순서 및 필요 시간을 적어주세요." class="w-full pl-14 pr-6 py-5 rounded-3xl border-2 border-slate-100 bg-slate-50 focus:ring-4 focus:ring-indigo-100 outline-none font-bold text-sm h-full min-h-[140px] resize-none"></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-black">3</div><h3 class="font-black text-2xl text-slate-800 tracking-tight">희망 시간 선택</h3></div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="user-time-slots">
                                <!-- Time slots will be injected here -->
                            </div>
                        </div>

                        <div class="pt-4">
                            <button type="submit" class="group w-full bg-slate-900 text-white font-black py-6 rounded-3xl shadow-2xl shadow-indigo-100 transition-all hover:bg-black flex items-center justify-center gap-4 active:scale-95">
                                장비 사용 신청 완료하기 <i data-lucide="arrow-right" class="w-6 h-6 group-hover:translate-x-2 transition-transform"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </section>

        <!-- --- SECTION 2: ADMIN VIEW --- -->
        <section id="view-admin" class="view-section space-y-8">
            <!-- Auth Screen -->
            <div id="admin-auth-screen" class="max-w-md mx-auto mt-20 bg-white rounded-[40px] shadow-2xl p-12 text-center border border-slate-100">
                <div class="w-20 h-20 bg-indigo-50 rounded-3xl flex items-center justify-center mx-auto mb-8 text-indigo-600"><i data-lucide="lock" class="w-10 h-10"></i></div>
                <h3 class="font-black text-2xl mb-2 text-slate-900">관리자 인증</h3>
                <p class="text-sm text-slate-400 mb-10 font-medium leading-relaxed">데이터 관리를 위해 비밀번호가 필요합니다.</p>
                <form id="admin-login-form" class="space-y-6">
                    <div class="relative">
                        <input type="password" id="admin-pass-input" placeholder="••••" class="w-full px-6 py-5 rounded-2xl border-2 border-slate-100 bg-slate-50 outline-none text-center font-black tracking-[1.5em] text-2xl focus:border-indigo-500 transition-all">
                        <p id="admin-auth-error" class="text-xs text-rose-500 font-bold mt-3 hidden">비밀번호가 올바르지 않습니다.</p>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-indigo-100 transition-all active:scale-95">인증 및 접속</button>
                </form>
            </div>

            <!-- Admin Panel Content -->
            <div id="admin-panel" class="hidden space-y-10">
                <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight flex items-center gap-3">
                        <i data-lucide="layout-dashboard" class="w-8 h-8 text-indigo-600"></i> 시스템 통합 관제
                    </h2>
                    <div class="flex bg-slate-200 p-1.5 rounded-2xl gap-1">
                        <button onclick="admin.switchTab('dashboard')" id="admin-nav-dashboard" class="admin-nav-btn flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-black transition-all bg-white shadow-sm text-indigo-600">
                            <i data-lucide="calendar" class="w-4 h-4"></i> 예약 및 현황 관리
                        </button>
                        <button onclick="admin.switchTab('settings')" id="admin-nav-settings" class="admin-nav-btn flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-black transition-all text-slate-500 hover:text-slate-800">
                            <i data-lucide="settings" class="w-4 h-4"></i> 타겟 및 공지 설정
                        </button>
                        <button onclick="admin.logout()" class="px-4 py-2 text-slate-400 hover:text-rose-500 transition-colors"><i data-lucide="log-out" class="w-5 h-5"></i></button>
                    </div>
                </div>

                <!-- Admin Dash (Scheduler + List) -->
                <div id="admin-tab-dashboard" class="admin-tab space-y-12 animate-in fade-in duration-500">
                    <section class="space-y-4">
                        <h4 class="font-black text-xl text-slate-800 flex items-center gap-2 px-2">
                            <i data-lucide="clock" class="w-5 h-5 text-indigo-500"></i> 실시간 통합 스케줄러
                        </h4>
                        <div class="bg-white rounded-[40px] border border-slate-200 shadow-2xl overflow-hidden overflow-x-auto custom-scrollbar">
                            <table class="w-full border-collapse min-w-[800px]">
                                <thead class="bg-slate-50 border-b border-slate-100">
                                    <tr>
                                        <th class="p-4 border-r w-20 sticky left-0 bg-slate-50 z-20 text-[10px] font-black text-slate-400 uppercase tracking-widest">TIME</th>
                                        <th colSpan="2" class="p-4 border-r text-sm font-black text-slate-800 bg-slate-50/50 text-center">토요일</th>
                                        <th colSpan="2" class="p-4 border-r text-sm font-black text-slate-800 bg-slate-50/50 text-center">일요일</th>
                                    </tr>
                                    <tr class="text-[9px] font-black text-slate-400 uppercase border-b border-slate-50">
                                        <th class="border-r sticky left-0 bg-slate-50 z-20"></th>
                                        <th class="py-2 text-indigo-600 border-r text-center">SPT</th><th class="py-2 text-rose-600 border-r text-center">ALD</th>
                                        <th class="py-2 text-indigo-600 border-r text-center">SPT</th><th class="py-2 text-rose-600 text-center">ALD</th>
                                    </tr>
                                </thead>
                                <tbody id="admin-scheduler-body">
                                    <!-- Rows will be injected -->
                                </tbody>
                            </table>
                        </div>
                    </section>

                    <section class="space-y-4">
                        <div class="flex items-center justify-between px-2">
                            <h4 class="font-black text-xl text-slate-800 flex items-center gap-2">
                                <i data-lucide="clipboard-list" class="w-5 h-5 text-indigo-500"></i> 상세 데이터 로그
                            </h4>
                            <span id="admin-count-badge" class="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-xs font-black">총 0건</span>
                        </div>
                        <div id="admin-log-list" class="grid gap-4">
                            <!-- Log cards will be injected -->
                        </div>
                    </section>
                </div>

                <!-- Admin Settings -->
                <div id="admin-tab-settings" class="admin-tab hidden max-w-2xl mx-auto bg-white rounded-[40px] border border-slate-200 shadow-2xl p-12 space-y-10 animate-in zoom-in-95">
                    <div class="space-y-4">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><i data-lucide="zap" class="w-4 h-4 text-amber-500"></i> 교체 타겟 관리 (콤마 구분)</label>
                        <textarea id="edit-targets" class="w-full p-6 rounded-3xl border-2 border-slate-100 bg-slate-50 focus:ring-4 focus:ring-indigo-100 outline-none transition-all font-bold text-slate-700 h-32 resize-none" placeholder="TiN, HfN, W, Ta..."></textarea>
                    </div>
                    <div class="space-y-4">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><i data-lucide="info" class="w-4 h-4 text-blue-500"></i> 상단 공지 사항</label>
                        <textarea id="edit-notice" class="w-full p-6 rounded-3xl border-2 border-slate-100 bg-slate-50 focus:ring-4 focus:ring-indigo-100 outline-none transition-all font-bold text-slate-700 h-24 resize-none"></textarea>
                    </div>
                    <button onclick="admin.saveSettings()" class="w-full bg-indigo-600 text-white font-black py-6 rounded-3xl shadow-xl shadow-indigo-100 transition-all hover:bg-indigo-700 flex items-center justify-center gap-3 active:scale-95">
                        <i data-lucide="save" class="w-5 h-5"></i> 설정 데이터 저장
                    </button>
                </div>
            </div>
        </section>
    </main>

    <footer class="mt-20 text-center opacity-40">
        <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em]">Lab Integrated System • Ph.D. Jaejun</p>
    </footer>

    <script>
        // --- 1. FIREBASE CONFIGURATION (수정 필요 부분) ---
        // Firebase Console > 프로젝트 설정 > 내 앱에서 복사한 객체를 아래에 붙여넣으세요.
        const firebaseConfig = {
             apiKey: "AIzaSyBIWfPT-0GfS6RqGGEglB9EXOL8REb5kHo",
             authDomain: "weekend-schedule-65949.firebaseapp.com",
             databaseURL: "https://weekend-schedule-65949-default-rtdb.firebaseio.com",
             projectId: "weekend-schedule-65949",
             storageBucket: "weekend-schedule-65949.firebasestorage.app",
             messagingSenderId: "616328532315",
             appId: "1:616328532315:web:ad5b773b82bec178d48a7e",
             measurementId: "G-21RR092584"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lab-equipment-integrated';

        // --- 2. GLOBAL STATE ---
        const state = {
            bookings: [],
            settings: { targets: [], notice: '' },
            user: null,
            form: {
                name: '',
                equipments: [],
                plan: '',
                selectedSlots: []
            },
            admin: {
                isAuthenticated: false,
                currentTab: 'dashboard'
            }
        };

        const HOURS = Array.from({ length: 24 }, (_, i) => `${i.toString().padStart(2, '0')}:00`);

        // --- 3. CORE LOGIC ---
        const router = {
            go(view) {
                document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`view-${view}`).classList.add('active');
                
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-white', 'shadow-sm', 'text-indigo-600'));
                document.getElementById(`nav-${view}`).classList.add('bg-white', 'shadow-sm', 'text-indigo-600');
                
                if(view === 'admin' && state.admin.isAuthenticated) {
                    admin.switchTab('dashboard');
                }
                lucide.createIcons();
            }
        };

        function showFeedback(text, type = 'success') {
            const toast = document.getElementById('feedback-toast');
            const container = document.getElementById('toast-container');
            const icon = document.getElementById('toast-icon');
            const txt = document.getElementById('toast-text');

            toast.classList.remove('hidden');
            txt.innerText = text;

            if(type === 'error') {
                container.className = 'px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 border bg-rose-50 border-rose-200 text-rose-700';
                icon.innerHTML = '<i data-lucide="alert-circle" class="w-5 h-5"></i>';
            } else {
                container.className = 'px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 border bg-emerald-50 border-emerald-200 text-emerald-700';
                icon.innerHTML = '<i data-lucide="check-circle-2" class="w-5 h-5"></i>';
            }
            lucide.createIcons();
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        // --- 4. RENDERERS ---
        function renderUserSlots() {
            const container = document.getElementById('user-time-slots');
            let html = '';
            const daysArr = [{id:'sat', label:'토요일'}, {id:'sun', label:'일요일'}];

            daysArr.forEach(day => {
                html += `
                    <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100 shadow-inner">
                        <div class="flex items-center gap-2 mb-4 px-1">
                            <i data-lucide="calendar" class="w-4 h-4 ${day.id === 'sat' ? 'text-indigo-600' : 'text-rose-600'}"></i>
                            <span class="font-black text-sm text-slate-700">${day.label}</span>
                        </div>
                        <div class="grid grid-cols-4 gap-2">
                `;
                HOURS.forEach(h => {
                    const isDisabled = state.form.equipments.includes('sputter') && day.id === 'sat' && parseInt(h) < 13;
                    const isSelected = state.form.selectedSlots.some(s => s.day === day.id && s.time === h);
                    html += `
                        <button type="button" 
                            onclick="handleToggleSlot('${day.id}', '${h}')"
                            class="slot-btn py-2 rounded-xl text-[10px] font-black transition-all border ${isDisabled ? 'disabled' : isSelected ? 'selected' : 'bg-white border-slate-200 text-slate-500 hover:border-indigo-300'}"
                            ${isDisabled ? 'disabled' : ''}>
                            ${h}
                        </button>
                    `;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;
            lucide.createIcons();
        }

        function renderAdminScheduler() {
            const body = document.getElementById('admin-scheduler-body');
            let html = '';
            HOURS.forEach((h, idx) => {
                html += `<tr class="${idx % 2 === 0 ? 'bg-white' : 'bg-slate-50/10'} border-b border-slate-50 hover:bg-indigo-50/20 transition-colors">
                    <td class="p-2 text-[10px] font-bold text-slate-400 text-center border-r sticky left-0 bg-inherit z-10">${h}</td>
                `;
                ['sat', 'sun'].forEach(day => {
                    ['sputter', 'ald'].forEach(eq => {
                        const booking = state.bookings.find(b => b.equipments.includes(eq) && b.selectedSlots.some(s => s.day === day && s.time === h));
                        html += `<td class="border-r border-slate-50 h-16 p-1 min-w-[150px] relative group">
                            ${booking ? `
                                <div class="h-full w-full rounded-xl flex flex-col justify-center p-3 shadow-sm border-l-4 ${eq === 'sputter' ? 'bg-indigo-50 text-indigo-700 border-indigo-600' : 'bg-rose-50 text-rose-700 border-rose-600'} animate-in zoom-in-95 duration-300">
                                    <div class="font-black text-[11px] truncate uppercase">${booking.name}</div>
                                    <div class="text-[8px] opacity-70 font-bold truncate mt-0.5">${booking.plan}</div>
                                </div>
                            ` : ''}
                        </td>`;
                    });
                });
                html += `</tr>`;
            });
            body.innerHTML = html;
        }

        function renderAdminList() {
            const container = document.getElementById('admin-log-list');
            const badge = document.getElementById('admin-count-badge');
            badge.innerText = `총 ${state.bookings.length}건 접수됨`;

            if(state.bookings.length === 0) {
                container.innerHTML = `<div class="bg-white rounded-[40px] p-20 text-center border-2 border-dashed border-slate-200"><p class="text-slate-400 font-bold">내역이 없습니다.</p></div>`;
                return;
            }

            container.innerHTML = state.bookings.sort((a,b) => b.createdAt.localeCompare(a.createdAt)).map(b => `
                <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 flex flex-col md:flex-row md:items-center justify-between gap-6 hover:shadow-lg transition-all group border-l-8 border-l-slate-200 hover:border-l-indigo-500">
                    <div class="flex gap-6 items-start flex-1">
                        <div class="flex flex-col gap-1 shrink-0 pt-1">
                            ${b.equipments.map(eq => `<span class="px-2 py-0.5 rounded-lg text-[9px] font-black text-center shadow-sm ${eq === 'sputter' ? 'bg-indigo-100 text-indigo-700' : 'bg-rose-100 text-rose-700'}">${eq.toUpperCase()}</span>`).join('')}
                        </div>
                        <div class="space-y-2 flex-1">
                            <div class="flex items-center gap-3">
                                <span class="font-black text-xl text-slate-800 tracking-tighter">${b.name}</span>
                                <span class="text-[10px] text-slate-400 font-bold bg-slate-50 px-2 py-1 rounded-full uppercase">${new Date(b.createdAt).toLocaleString()}</span>
                            </div>
                            <div class="flex flex-wrap gap-1.5">
                                ${b.selectedSlots.map(s => `<span class="bg-slate-100 text-slate-500 px-3 py-1 rounded-lg text-[10px] font-black border border-slate-200">${s.day === 'sat' ? '토' : '일'} ${s.time}</span>`).join('')}
                            </div>
                            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-xs font-bold text-slate-600 italic">"${b.plan}"</div>
                        </div>
                    </div>
                    <button onclick="admin.deleteBooking('${b.id}')" class="p-4 text-slate-300 hover:text-rose-500 opacity-100 md:opacity-0 group-hover:opacity-100 transition-all bg-slate-50 hover:bg-rose-50 rounded-2xl shrink-0">
                        <i data-lucide="trash-2" class="w-6 h-6"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function updateUIFromSettings() {
            document.getElementById('user-notice-text').innerText = state.settings.notice;
            document.getElementById('user-targets-container').innerHTML = state.settings.targets.map(t => 
                `<span class="bg-amber-400 text-amber-950 px-3 py-1.5 rounded-xl text-xs font-black shadow-lg">${t}</span>`
            ).join('');
            
            document.getElementById('edit-targets').value = state.settings.targets.join(', ');
            document.getElementById('edit-notice').value = state.settings.notice;
        }

        // --- 5. EVENT HANDLERS ---
        function handleToggleSlot(day, time) {
            const idx = state.form.selectedSlots.findIndex(s => s.day === day && s.time === time);
            if(idx > -1) {
                state.form.selectedSlots.splice(idx, 1);
            } else {
                state.form.selectedSlots.push({day, time});
            }
            renderUserSlots();
        }

        document.querySelectorAll('.eq-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const eq = btn.getAttribute('data-eq');
                const idx = state.form.equipments.indexOf(eq);
                if(idx > -1) {
                    state.form.equipments.splice(idx, 1);
                    btn.className = "eq-btn flex-1 py-6 rounded-3xl border-2 font-black text-base transition-all flex flex-col items-center gap-2 bg-white border-slate-100 text-slate-400 hover:border-slate-300";
                } else {
                    state.form.equipments.push(eq);
                    const colorClass = eq === 'sputter' ? 'bg-indigo-600 border-indigo-600 text-white shadow-xl shadow-indigo-100' : 'bg-rose-600 border-rose-600 text-white shadow-xl shadow-rose-100';
                    btn.className = `eq-btn flex-1 py-6 rounded-3xl border-2 font-black text-base transition-all flex flex-col items-center gap-2 ${colorClass}`;
                }
                state.form.selectedSlots = []; 
                renderUserSlots();
            });
        });

        document.getElementById('reservation-form').onsubmit = async (e) => {
            e.preventDefault();
            state.form.name = document.getElementById('input-name').value;
            state.form.plan = document.getElementById('input-plan').value;

            if(!state.form.name || state.form.equipments.length === 0 || state.form.selectedSlots.length === 0) {
                showFeedback("모든 필수 항목을 입력해주세요.", "error");
                return;
            }

            try {
                await db.collection(`artifacts/${appId}/public/data/bookings`).add({
                    ...state.form,
                    createdAt: new Date().toISOString()
                });
                showFeedback("신청이 완료되었습니다!");
                document.getElementById('reservation-form').reset();
                state.form = { name: '', equipments: [], plan: '', selectedSlots: [] };
                document.querySelectorAll('.eq-btn').forEach(b => b.className = "eq-btn flex-1 py-6 rounded-3xl border-2 font-black text-base transition-all flex flex-col items-center gap-2 bg-white border-slate-100 text-slate-400 hover:border-slate-300");
                renderUserSlots();
            } catch (err) {
                showFeedback("저장 실패", "error");
            }
        };

        // --- 6. ADMIN MODULE ---
        const admin = {
            auth() {
                const pass = document.getElementById('admin-pass-input').value;
                if(pass === "0000") {
                    state.admin.isAuthenticated = true;
                    document.getElementById('admin-auth-screen').classList.add('hidden');
                    document.getElementById('admin-panel').classList.remove('hidden');
                    this.switchTab('dashboard');
                } else {
                    document.getElementById('admin-auth-error').classList.remove('hidden');
                }
            },
            logout() {
                state.admin.isAuthenticated = false;
                document.getElementById('admin-panel').classList.add('hidden');
                document.getElementById('admin-auth-screen').classList.remove('hidden');
                document.getElementById('admin-pass-input').value = '';
            },
            switchTab(tab) {
                state.admin.currentTab = tab;
                document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('hidden'));
                document.getElementById(`admin-tab-${tab}`).classList.remove('hidden');

                document.querySelectorAll('.admin-nav-btn').forEach(b => b.classList.remove('bg-white', 'shadow-sm', 'text-indigo-600'));
                document.getElementById(`admin-nav-${tab}`).classList.add('bg-white', 'shadow-sm', 'text-indigo-600');
                
                if(tab === 'dashboard') {
                    renderAdminScheduler();
                    renderAdminList();
                }
                lucide.createIcons();
            },
            async saveSettings() {
                const targets = document.getElementById('edit-targets').value.split(',').map(t => t.trim()).filter(t => t);
                const notice = document.getElementById('edit-notice').value;
                try {
                    await db.doc(`artifacts/${appId}/public/data/settings/global`).set({ targets, notice });
                    showFeedback("설정이 업데이트되었습니다.");
                } catch (err) {
                    showFeedback("저장 실패", "error");
                }
            },
            async deleteBooking(id) {
                if(!confirm("정말 삭제하시겠습니까?")) return;
                try {
                    await db.doc(`artifacts/${appId}/public/data/bookings/${id}`).delete();
                    showFeedback("삭제 완료");
                } catch (err) {
                    showFeedback("삭제 실패", "error");
                }
            }
        };

        document.getElementById('admin-login-form').onsubmit = (e) => {
            e.preventDefault();
            admin.auth();
        };

        // --- 7. DATA INITIALIZATION ---
        async function startSystem() {
            // Auth initialization
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await auth.signInWithCustomToken(__initial_auth_token);
            } else {
                await auth.signInAnonymously();
            }

            // Sync Settings
            db.doc(`artifacts/${appId}/public/data/settings/global`).onSnapshot(snap => {
                if(snap.exists()) {
                    state.settings = snap.data();
                    updateUIFromSettings();
                }
            });

            // Sync Bookings
            db.collection(`artifacts/${appId}/public/data/bookings`).onSnapshot(snap => {
                state.bookings = snap.docs.map(d => ({id: d.id, ...d.data()}));
                if(state.admin.isAuthenticated && state.admin.currentTab === 'dashboard') {
                    renderAdminScheduler();
                    renderAdminList();
                }
            });

            renderUserSlots();
            lucide.createIcons();
        }

        window.onload = startSystem;

    </script>
</body>
</html>
